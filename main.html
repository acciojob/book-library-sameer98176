<!DOCTYPE html>
<html>
<head>
    <title>Book Library</title>
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
        }

        .book-library {
            background-color: #ffffff;
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .book {
            width: 200px;
            padding: 15px;
            margin: 15px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .book img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .title {
            font-weight: bold;
            margin: 10px 0;
        }

        .author {
            color: #777777;
            font-size: 14px;
        }

        .price {
            background-color: #2ecc71;
            color: white;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="book-library">

    <div class="book">
        <img src="https://m.media-amazon.com/images/I/81s6DUyQCZL.jpg" alt="Spy in the Amber">
        <div class="title">Spy in the Amber</div>
        <div class="author">By Noel Hynd</div>
        <div class="price">₹299</div>
    </div>

    <div class="book">
        <img src="https://m.media-amazon.com/images/I/91zbi9M+mKL.jpg" alt="Sacred Games">
        <div class="title">Sacred Games</div>
        <div class="author">By Vikram Chandra</div>
        <div class="price">₹399</div>
    </div>

    <div class="book">
        <img src="https://m.media-amazon.com/images/I/81q77Q39nEL.jpg" alt="Byomkesh Bakshi">
        <div class="title">Byomkesh Bakshi</div>
        <div class="author">By Saradindu Bandyopadhyay</div>
        <div class="price">₹249</div>
    </div>

</div>

</body>
</html>
