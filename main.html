<!DOCTYPE html>
<html>
<head>
    <title>Book Library</title>
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            text-align: center;
        }

        .book-library {
            background-color: #ffffff;
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            box-shadow: 0px 0px 10px #ccc; /* REQUIRED */
        }

        .book {
            width: 200px;
            padding: 15px;
            margin: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .book img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .book h2 {
            margin: 10px 0;
        }

        .book p {
            color: #777777; /* AUTHOR COLOR */
        }

        .price {
            background-color: #2ecc71;
            color: white;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>Book Library</h1>

<div class="book-library">

    <div class="book">
        <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Spy-in-the-Amber-by-Manohar-Malgonkar.jpg">
        <h2>Spy in the Amber</h2>
        <p>By Manohar Malgonkar</p>
        <div class="price">₹299</div>
    </div>

    <div class="book">
        <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Sacred-Games-by-Vikram-Chandra.jpg">
        <h2>Sacred Games</h2>
        <p>By Vikram Chandra</p>
        <div class="price">₹399</div>
    </div>

    <div class="book">
        <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Byomkesh-Bakshi-by-Sharadindu-Bandyopadhyay.jpg">
        <h2>Byomkesh Bakshi</h2>
        <p>By Saradindu Bandyopadhyay</p>
        <div class="price">₹249</div>
    </div>

</div>

</body>
</html>
